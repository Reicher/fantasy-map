<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isolerad fantasivärld</title>
    <script>
      (() => {
        const path = window.location.pathname.replace(/\/+$/, "") || "/";
        document.documentElement.dataset.route =
          path.endsWith("/editor") || path.endsWith("/editor/index.html")
            ? "editor"
            : "play";
      })();
    </script>
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%23e6d7b6"/><path d="M6 22 L13 10 L20 22 M12 17 L16 12 L23 22" fill="none" stroke="%23543f27" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    />
    <link rel="stylesheet" href="./styles.css?v=20260409b" />
  </head>
  <body>
    <div id="editor-shell" class="app-shell">
      <aside class="control-panel">
        <div class="mode-row">
          <button
            id="enter-play"
            type="button"
            class="ghost-button mode-button"
          >
            Spela
          </button>
        </div>

        <form id="controls" class="controls">
          <label class="field seed-field">
            <span class="field-label">Seed</span>
            <div class="seed-row">
              <input id="seed" name="seed" type="text" spellcheck="false" />
              <button id="random-seed" type="button" class="ghost-button">
                Slumpa
              </button>
            </div>
          </label>

          <div data-controls-mount></div>

          <div class="button-row">
            <button id="generate" type="submit" class="primary-button">
              Generera karta
            </button>
            <button id="reset" type="button" class="ghost-button">
              Återställ
            </button>
          </div>
        </form>

        <section class="info-card">
          <h2>Världsöversikt</h2>
          <dl id="stats" class="stats"></dl>
        </section>
      </aside>

      <main class="map-panel">
        <div class="map-frame">
          <div class="map-toolbar">
            <span id="world-title" class="world-title"></span>
            <div class="map-actions">
              <div class="map-action-group map-action-group--toggles">
                <button
                  id="toggle-biome-labels"
                  type="button"
                  class="ghost-button toggle-button"
                >
                  Kartnamn
                </button>
                <button
                  id="toggle-node-labels"
                  type="button"
                  class="ghost-button toggle-button"
                >
                  Nodnamn
                </button>
                <button
                  id="toggle-snow"
                  type="button"
                  class="ghost-button toggle-button"
                >
                  Snö
                </button>
              </div>
              <div class="map-action-group map-action-group--view">
                <div class="zoom-control" aria-label="Zoomkontroll">
                  <button
                    id="zoom-out"
                    type="button"
                    class="ghost-button zoom-step-button"
                    aria-label="Zooma ut"
                  >
                    −
                  </button>
                  <span id="zoom-level" class="zoom-chip">100%</span>
                  <button
                    id="zoom-in"
                    type="button"
                    class="ghost-button zoom-step-button"
                    aria-label="Zooma in"
                  >
                    +
                  </button>
                </div>
                <button id="reset-view" type="button" class="ghost-button">
                  Återställ vy
                </button>
                <button id="save-image" type="button" class="ghost-button">
                  Spara PNG
                </button>
              </div>
            </div>
          </div>
          <div class="canvas-wrap">
            <div id="editor-loading" class="editor-loading" hidden>
              <div class="editor-loading-copy">
                <div class="editor-loading-title">Genererar karta</div>
                <div class="editor-loading-subtitle">
                  Bygger terräng, vägar och etiketter...
                </div>
              </div>
            </div>
            <canvas
              id="map-canvas"
              width="1200"
              height="840"
              aria-label="Genererad fantasikarta"
            ></canvas>
            <div id="tooltip" class="tooltip" hidden></div>
          </div>
        </div>
      </main>
    </div>

    <section id="play-view" class="play-view" hidden>
      <div class="play-frame">
        <div id="play-loading" class="play-loading" hidden>Skapar spel...</div>
        <div id="play-tooltip" class="tooltip" hidden></div>
        <div id="play-map-legend" class="play-map-legend" hidden>
          <div class="play-map-legend-title">Karta</div>
          <div class="play-map-legend-buttons">
            <button
              id="play-toggle-biome-labels"
              type="button"
              class="ghost-button toggle-button"
            >
              Kartnamn
            </button>
            <button
              id="play-toggle-node-labels"
              type="button"
              class="ghost-button toggle-button"
            >
              Nodnamn
            </button>
            <button
              id="play-toggle-hover"
              type="button"
              class="ghost-button toggle-button"
            >
              Hoverinfo
            </button>
          </div>
          <div class="play-map-legend-zoom">
            <button
              id="play-zoom-1"
              type="button"
              class="ghost-button toggle-button"
              data-zoom="1"
            >
              ×1
            </button>
            <button
              id="play-zoom-2"
              type="button"
              class="ghost-button toggle-button"
              data-zoom="2"
            >
              ×2
            </button>
            <button
              id="play-zoom-3"
              type="button"
              class="ghost-button toggle-button"
              data-zoom="3"
            >
              ×3
            </button>
          </div>
        </div>
        <div id="play-arrival-cue" class="play-arrival-cue" aria-live="polite">
          <span id="play-arrival-cue-text"></span>
        </div>
        <canvas
          id="play-canvas"
          width="1200"
          height="840"
          aria-label="Spelvy"
        ></canvas>
        <section id="play-journey-panel" class="play-journey-panel" hidden>
          <canvas
            id="play-journey-canvas"
            class="play-journey-canvas"
            aria-hidden="true"
          ></canvas>
        </section>
        <div id="play-bottom-hud" class="play-bottom-hud" hidden>
          <button
            id="play-switch-mode"
            type="button"
            class="ghost-button play-hud-button play-hud-button--mode"
            data-tooltip="Växla mellan karta och resa (M)"
            title="Växla mellan karta och resa (M)"
          >
            Resa
          </button>
          <div id="play-location-line" class="play-location-line"></div>
        </div>
      </div>
    </section>

    <script type="module" src="./src/app.js?v=20260409c"></script>
  </body>
</html>
