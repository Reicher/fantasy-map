<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isolerad fantasivärld</title>
    <script>
      document.documentElement.dataset.route = "editor";
    </script>
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%23e6d7b6"/><path d="M6 22 L13 10 L20 22 M12 17 L16 12 L23 22" fill="none" stroke="%23543f27" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    />
    <link rel="stylesheet" href="../styles.css?v=20260407a" />
  </head>
  <body>
    <div id="editor-shell" class="app-shell">
      <aside class="control-panel">
        <form id="controls" class="controls">
          <label class="field seed-field">
            <span class="field-label">Seed</span>
            <div class="seed-row">
              <input id="seed" name="seed" type="text" spellcheck="false" />
              <button id="random-seed" type="button" class="ghost-button">
                Slumpa
              </button>
            </div>
          </label>

          <nav class="tab-bar" aria-label="Inställningar">
            <button class="tab-btn" data-tab="karta" type="button">
              Karta
            </button>
            <button class="tab-btn" data-tab="vatten" type="button">
              Vatten
            </button>
            <button class="tab-btn" data-tab="stader" type="button">
              Städer
            </button>
            <button class="tab-btn" data-tab="avancerat" type="button">
              Avancerat
            </button>
          </nav>

          <!-- Karta: size, coast, mountains, climate, moisture -->
          <div class="tab-panel" data-tab-panel="karta">
            <div class="field">
              <div class="field-header">
                <span class="field-label">Kartstorlek</span>
                <span id="mapSize-value" class="field-value"></span>
              </div>
              <input
                id="mapSize"
                name="mapSize"
                type="range"
                min="10"
                max="100"
                step="1"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Kustlinje</span>
                <span id="coastComplexity-value" class="field-value"></span>
              </div>
              <input
                id="coastComplexity"
                name="coastComplexity"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Bergighet</span>
                <span id="mountainousness-value" class="field-value"></span>
              </div>
              <input
                id="mountainousness"
                name="mountainousness"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Klimat</span>
                <span id="temperatureBias-value" class="field-value"></span>
              </div>
              <input
                id="temperatureBias"
                name="temperatureBias"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Fuktighet</span>
                <span id="moistureBias-value" class="field-value"></span>
              </div>
              <input
                id="moistureBias"
                name="moistureBias"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
          </div>

          <!-- Vatten: rivers, lake count, lake size -->
          <div class="tab-panel" data-tab-panel="vatten" hidden>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Floder</span>
                <span id="riverAmount-value" class="field-value"></span>
              </div>
              <input
                id="riverAmount"
                name="riverAmount"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Sjömängd</span>
                <span id="lakeAmount-value" class="field-value"></span>
              </div>
              <input
                id="lakeAmount"
                name="lakeAmount"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Sjöstorlek</span>
                <span id="lakeSize-value" class="field-value"></span>
              </div>
              <input
                id="lakeSize"
                name="lakeSize"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
          </div>

          <!-- Städer: city density, coastal bias, road density -->
          <div class="tab-panel" data-tab-panel="stader" hidden>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Stadstäthet</span>
                <span id="cityDensity-value" class="field-value"></span>
              </div>
              <input
                id="cityDensity"
                name="cityDensity"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Kustpreferens</span>
                <span id="coastalBias-value" class="field-value"></span>
              </div>
              <input
                id="coastalBias"
                name="coastalBias"
                type="range"
                min="0"
                max="100"
                step="1"
              />
            </div>
          </div>

          <!-- Avancerat: technical generation & render settings -->
          <div class="tab-panel" data-tab-panel="avancerat" hidden>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Rasterupplösning</span>
                <span id="edgeDetail-value" class="field-value"></span>
              </div>
              <input
                id="edgeDetail"
                name="edgeDetail"
                type="range"
                min="180"
                max="520"
                step="10"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Minsta biomstorlek</span>
                <span id="minBiomeSize-value" class="field-value"></span>
              </div>
              <input
                id="minBiomeSize"
                name="minBiomeSize"
                type="range"
                min="0"
                max="20"
                step="1"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Renderupplösning</span>
                <span id="renderScale-value" class="field-value"></span>
              </div>
              <input
                id="renderScale"
                name="renderScale"
                type="range"
                min="50"
                max="250"
                step="25"
              />
            </div>
            <div class="field">
              <div class="field-header">
                <span class="field-label">Siktradie</span>
                <span id="fogVisionRadius-value" class="field-value"></span>
              </div>
              <input
                id="fogVisionRadius"
                name="fogVisionRadius"
                type="range"
                min="6"
                max="40"
                step="1"
              />
            </div>
          </div>

          <div class="button-row">
            <button id="generate" type="submit" class="primary-button">
              Bygg ny karta
            </button>
            <button id="reset" type="button" class="ghost-button">
              Återställ
            </button>
          </div>
        </form>

        <section class="info-card">
          <h2>Världsöversikt</h2>
          <dl id="stats" class="stats"></dl>
        </section>
      </aside>

      <main class="map-panel">
        <div class="map-frame">
          <div class="canvas-wrap">
            <div class="map-toolbar">
              <div class="map-actions">
                <div
                  class="map-action-group map-action-group--layers"
                  aria-label="Lager"
                >
                  <button
                    id="toggle-biome-labels"
                    type="button"
                    class="ghost-button toggle-button"
                  >
                    Kartnamn
                  </button>
                  <button
                    id="toggle-city-labels"
                    type="button"
                    class="ghost-button toggle-button"
                  >
                    Städer
                  </button>
                  <button
                    id="toggle-snow"
                    type="button"
                    class="ghost-button toggle-button"
                  >
                    Snö
                  </button>
                  <button
                    id="toggle-monochrome"
                    type="button"
                    class="ghost-button toggle-button"
                  >
                    Svartvitt
                  </button>
                </div>
                <div
                  class="map-action-group map-action-group--zoom"
                  aria-label="Zoom"
                >
                  <button
                    id="zoom-1"
                    type="button"
                    class="ghost-button toggle-button zoom-level-button"
                    data-zoom="1"
                  >
                    ×1
                  </button>
                  <button
                    id="zoom-2"
                    type="button"
                    class="ghost-button toggle-button zoom-level-button"
                    data-zoom="2"
                  >
                    ×2
                  </button>
                  <button
                    id="zoom-3"
                    type="button"
                    class="ghost-button toggle-button zoom-level-button"
                    data-zoom="3"
                  >
                    ×3
                  </button>
                </div>
                <div
                  class="map-action-group map-action-group--export"
                  aria-label="Export"
                >
                  <button id="save-image" type="button" class="ghost-button">
                    Spara PNG
                  </button>
                </div>
              </div>
            </div>
            <div id="editor-loading" class="editor-loading" hidden>
              <div class="editor-loading-copy">
                <div class="editor-loading-title">Genererar karta</div>
                <div class="editor-loading-subtitle">
                  Bygger terräng, vägar och etiketter...
                </div>
              </div>
            </div>
            <canvas
              id="map-canvas"
              width="1200"
              height="840"
              aria-label="Genererad fantasikarta"
            ></canvas>
            <button
              id="enter-play"
              type="button"
              class="primary-button play-map-button"
            >
              &#9654;&#xFE0E; Spela
            </button>
            <div id="tooltip" class="tooltip" hidden></div>
          </div>
        </div>
      </main>
    </div>

    <section id="play-view" class="play-view" hidden>
      <div class="play-frame">
        <div id="play-loading" class="play-loading" hidden>Skapar spel...</div>
        <div id="play-tooltip" class="tooltip" hidden></div>
        <div id="play-map-legend" class="play-map-legend" hidden>
          <div class="play-map-legend-title">Karta</div>
          <div class="play-map-legend-buttons">
            <button
              id="play-toggle-biome-labels"
              type="button"
              class="ghost-button toggle-button"
            >
              Kartnamn
            </button>
            <button
              id="play-toggle-city-labels"
              type="button"
              class="ghost-button toggle-button"
            >
              Stadsnamn
            </button>
            <button
              id="play-toggle-hover"
              type="button"
              class="ghost-button toggle-button"
            >
              Hoverinfo
            </button>
          </div>
          <div class="play-map-legend-zoom">
            <button
              id="play-zoom-1"
              type="button"
              class="ghost-button toggle-button"
              data-zoom="1"
            >
              ×1
            </button>
            <button
              id="play-zoom-2"
              type="button"
              class="ghost-button toggle-button"
              data-zoom="2"
            >
              ×2
            </button>
            <button
              id="play-zoom-3"
              type="button"
              class="ghost-button toggle-button"
              data-zoom="3"
            >
              ×3
            </button>
          </div>
        </div>
        <canvas
          id="play-canvas"
          width="1200"
          height="840"
          aria-label="Spelvy"
        ></canvas>
        <section id="play-journey-panel" class="play-journey-panel" hidden>
          <canvas
            id="play-journey-canvas"
            class="play-journey-canvas"
            aria-hidden="true"
          ></canvas>
          <div class="play-journey-copy">
            <h1 id="play-journey-title" class="play-journey-title"></h1>
            <div id="play-journey-subtitle" class="play-journey-subtitle"></div>
          </div>
        </section>
        <div class="play-mode-hint">
          Tryck M för att visa eller dölja kartan
        </div>
      </div>
    </section>

    <script type="module" src="../src/app.js?v=20260407a"></script>
  </body>
</html>
